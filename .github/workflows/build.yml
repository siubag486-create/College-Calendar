name: Build Electron App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: next build --webpack && tsc --project tsconfig.electron.json && electron-builder --publish never

      - name: Copy exe to public/downloads
        run: |
          copy "dist\College Calendar Setup 0.1.0.exe" "public\downloads\college-calendar-setup.exe"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/downloads/college-calendar-setup.exe
          git diff --staged --quiet || git commit -m "Update Windows installer"
          git push
