appId: com.pswk.college-calendar
productName: College Calendar
directories:
  output: dist
files:
  - out/**
  - electron/main.js
  - electron/preload.js
  - electron/platform.js
  - electron/win32.js
  - electron/darwin.js
  - package.json
win:
  target: nsis
  files:
    - node_modules/koffi/**
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target: dmg
  category: public.app-category.productivity
  icon: build/icon.icns
